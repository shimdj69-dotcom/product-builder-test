<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test - Dog or Cat?</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

    <div class="container">
        <h1>Welcome to AI Tools</h1>
        <p class="subtitle">Try our latest AI features!</p>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <a href="animal.html" class="secondary-btn" style="text-decoration: none; padding: 15px 30px; background: var(--accent-gradient); font-weight: 700;">
                🐶 AI Animal Face Test 🐱
            </a>
        </div>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate">Generate Numbers</button>
        <div id="lotto-sets"></div>
    </div>

    <div class="container contact-form">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mgonjekv" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" rows="4" placeholder="Message" required></textarea>
            </div>
            <button type="submit" id="submit-contact">Send Message</button>
        </form>
    </div>

    <div class="container comments-section">
        <h2>Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-uzfmdbloov.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
