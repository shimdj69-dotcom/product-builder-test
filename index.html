<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

    <div class="container animal-test">
        <h1>AI Animal Face Test</h1>
        <p>Which animal do you look like?</p>

        <div id="upload-area" class="upload-box">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <label for="image-upload" class="upload-label">
                <span class="upload-icon">📸</span>
                <span class="upload-text">Click or Drag to Upload Photo</span>
            </label>
            <img id="face-image" src="" alt="Uploaded Face" style="display: none;">
        </div>

        <div id="loading-spinner" style="display: none;">Analyzing...</div>
        <div id="result-container" style="display: none;">
            <h2 id="result-message"></h2>
            <div id="label-container"></div>
        </div>

        <button id="predict-btn" style="display: none;">Analyze Again</button>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate">Generate Numbers</button>
        <div id="lotto-sets"></div>
    </div>

    <div class="container contact-form">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mgonjekv" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" rows="4" placeholder="Message" required></textarea>
            </div>
            <button type="submit" id="submit-contact">Send Message</button>
        </form>
    </div>

    <div class="container comments-section">
        <h2>Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-uzfmdbloov.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
</html>
