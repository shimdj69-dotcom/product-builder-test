<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test - Dog or Cat?</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <nav style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
        <a href="index.html" class="secondary-btn" style="text-decoration: none; padding: 10px 20px;">← Back to Home</a>
    </nav>

    <div class="container animal-test">
        <h1>🐶 AI Animal Face Test 🐱</h1>
        <p class="subtitle">Upload your photo to see if you look more like a Dog or a Cat!</p>

        <div id="upload-area" class="upload-box">
            <input type="file" id="image-upload" accept="image/*" hidden>
            <label for="image-upload" class="upload-label">
                <span class="upload-icon">📸</span>
                <span class="upload-text">Click or Drag to Upload Photo</span>
            </label>
            <img id="face-image" src="" alt="Uploaded Face" style="display: none;">
        </div>

        <div id="loading-spinner" class="spinner" style="display: none;">
            <div class="bounce1"></div>
            <div class="bounce2"></div>
            <div class="bounce3"></div>
            <p>Analyzing your features...</p>
        </div>

        <div id="result-container" style="display: none;">
            <h2 id="result-message"></h2>
            <div id="label-container"></div>
            <button id="restart-btn" class="secondary-btn">Try Another Photo</button>
        </div>
    </div>

    <div class="container comments-section">
        <h2>Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-uzfmdbloov.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="animal.js"></script>
</body>
</html>
